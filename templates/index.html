<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Personality Prediction System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="navbar">
        <h2>Personality Prediction Through CV Analysis</h2>
    </div>

    <div class="container">
        <div class="card">
            <h3>Upload Resume</h3>

            <form method="POST" enctype="multipart/form-data">
                <input type="file" name="resume" required>
                <button type="submit">Predict Personality</button>
            </form>

            {% if result %}
            <div class="result">
                <h4>Prediction Result</h4>
                <p>{{ result }}</p>
            </div>
            {% endif %}
        </div>
    </div>

    <footer>
        <p>© 2025 Personality Prediction System</p>
    </footer>

</body>
</html>
